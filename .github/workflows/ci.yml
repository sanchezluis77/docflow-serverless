name: DocFlow CI

# Se ejecuta cuando haces push o pull request a la rama main
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      # GitHub Actions necesita un Postgres para correr los tests si usáramos la DB real
      # Pero como usamos SQLite en memoria para tests, no es estrictamente necesario,
      # aunque es buena práctica dejarlo si quieres tests de integración reales.
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: docflow
          POSTGRES_PASSWORD: docflow_password
          POSTGRES_DB: docflow_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt

    - name: Run Tests with Pytest
      # Configuramos PYTHONPATH para que encuentre el módulo 'app'
      env:
        PYTHONPATH: backend
        # Aunque usamos SQLite, definimos la variable por si acaso
        DATABASE_URL: postgresql://docflow:docflow_password@localhost:5432/docflow_db 
      run: |
        cd backend
        pytest