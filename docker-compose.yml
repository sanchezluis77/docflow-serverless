version: '3.8'

services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data_new:/var/lib/postgresql/data/
      - ./backend/uploads:/code/uploads
    environment:
      - POSTGRES_USER=docflow
      - POSTGRES_PASSWORD=docflow_password
      - POSTGRES_DB=docflow_db
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    volumes:
      - ./backend:/code
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://docflow:docflow_password@db:5432/docflow_db
    depends_on:
      - db
  
  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules # Truco para evitar conflictos con node_modules locales
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend




volumes:
  postgres_data_new:


